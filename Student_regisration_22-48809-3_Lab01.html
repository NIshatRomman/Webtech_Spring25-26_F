<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Page</title>
    <style>
        body { font-family: "Times New Roman", serif; }
        .wrap { width: 520px; margin: 30px auto; }
        h1 { text-align: center; font-size: 36px; margin: 0 0 18px 0; font-weight: 700; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 8px 6px; vertical-align: middle; }
        td.label { width: 185px; font-weight: 700; }
        input[type="text"], input[type="email"], input[type="number"] { width: 185px; }
        textarea { width: 250px; height: 90px; resize: both; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Student Registration Page</h1>

        <form>
            <table>
                <tr>
                    <td class="label">Student Name:</td>
                    <td><input type="text" name="studentName" placeholder="Enter Your Name"></td>
                </tr>
                <tr>
                    <td class="label">Student CGPA:</td>
                    <td><input type="text" name="studentCgpa" placeholder="Enter Your CGPA"></td>
                </tr>
                <tr>
                    <td class="label">Male</td>
                    <td><input type="radio" name="gender" value="Male"></td>
                </tr>
                <tr>
                    <td class="label">Female</td>
                    <td><input type="radio" name="gender" value="Female"></td>
                </tr>
                <tr>
                    <td class="label">Select Department:</td>
                    <td>
                        <select name="department">
                            <option value="CSE">CSE</option>
                            <option value="EEE">EEE</option>
                            <option value="BBA">BBA</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td class="label">Student ID</td>
                    <td><input type="text" name="studentId"></td>
                </tr>
                <tr>
                    <td></td>
                    <td><textarea name="addressBox" placeholder="Enter your address here"></textarea></td>
                </tr>
                <tr>
                    <td class="label">Address:</td>
                    <td></td>
                </tr>
                <tr>
                    <td class="label">Date of Birth:</td>
                    <td><input type="date" name="dob"></td>
                </tr>
                <tr>
                    <td class="label">Email:</td>
                    <td><input type="email" name="email" placeholder="Enter your email"></td>
                </tr>
                <tr>
                    <td class="label">Upload your Grade Report:</td>
                    <td><input type="file" name="gradeReport"></td>
                </tr>
                <tr>
                    <td colspan="2">
                        I agree to the terms and conditions
                        <input type="checkbox" name="agree">
                    </td>
                </tr>
                <tr>
                    <td class="label">Phone Number:</td>
                    <td><input type="text" name="phone" placeholder="Enter your phone number"></td>
                </tr>
                <tr>
                    <td colspan="2" style="font-weight:700;">Submit your information</td>
                </tr>
                <tr>
                    <td colspan="2"><input type="submit" value="Submit"></td>
                </tr>
            </table>
        </form>
    </div>
</body>
</html>
